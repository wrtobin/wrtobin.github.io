---
layout: default
---
<article class="page-shell">
  <header class="page-header">
    {% if page.kicker %}<p class="eyebrow">{{ page.kicker }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="page-lede">{{ page.lede }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
