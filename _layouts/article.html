---
layout: default
---
<article class="article-entry">
  <header class="page-header">
    <p class="eyebrow">Self-published note</p>
    <h1>{{ page.title }}</h1>
    <p class="article-meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
      {% if page.status %}<span>{{ page.status }}</span>{% endif %}
    </p>
    {% if page.summary %}<p class="page-lede">{{ page.summary }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ '/articles/' | relative_url }}">Back to notes</a></p>
</article>
